version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: theworkingapp_postgres
    environment:
      POSTGRES_USER: theworkingapp
      POSTGRES_PASSWORD: theworkingapp
      POSTGRES_DB: theworkingapp_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U theworkingapp']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: theworkingapp_redis
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment for local IPFS node (optional — use Pinata cloud by default)
  # ipfs:
  #   image: ipfs/kubo:latest
  #   container_name: theworkingapp_ipfs
  #   ports:
  #     - '4001:4001'   # p2p
  #     - '5001:5001'   # API
  #     - '8080:8080'   # Gateway
  #   volumes:
  #     - ipfs_data:/data/ipfs

volumes:
  postgres_data:
  redis_data:
  # ipfs_data:
