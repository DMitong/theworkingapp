[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 15

[rpc_endpoints]
localhost    = "http://127.0.0.1:8545"
base_goerli  = "${BASE_GOERLI_RPC_URL}"
base         = "${BASE_MAINNET_RPC_URL}"
polygon      = "${POLYGON_MAINNET_RPC_URL}"
polygon_amoy = "${POLYGON_AMOY_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
polygon = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
